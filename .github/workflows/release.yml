name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.1.3, 0.1.3b1, 0.1.3.dev1)"
        required: true
      branch:
        description: "Branch to release from"
        required: true
        default: "master"
        type: choice
        options:
          - master
          - beta
          - dev

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Merge from upstream branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ "${{ inputs.branch }}" == "beta" ]]; then
            git merge origin/dev --no-edit
          elif [[ "${{ inputs.branch }}" == "master" ]]; then
            git merge origin/beta --no-edit
          fi

      - name: Resolve full version
        id: ver
        run: |
          BASE="${{ inputs.version }}"
          if [[ "${{ inputs.branch }}" == "dev" ]]; then
            FULL="${BASE}.dev1"
          elif [[ "${{ inputs.branch }}" == "beta" ]]; then
            FULL="${BASE}b1"
          else
            FULL="${BASE}"
          fi
          echo "full=$FULL" >> "$GITHUB_OUTPUT"

      - name: Update manifest version
        run: |
          python3 -c "
          import json
          with open('custom_components/bir_trash/manifest.json') as f:
              m = json.load(f)
          m['version'] = '${{ steps.ver.outputs.full }}'
          with open('custom_components/bir_trash/manifest.json', 'w') as f:
              json.dump(m, f, indent=2)
              f.write('\n')
          "

      - name: Commit and push
        run: |
          git add custom_components/bir_trash/manifest.json
          git diff --cached --quiet || git commit -m "Bump version to ${{ steps.ver.outputs.full }}"
          git push

      - name: Create release
        run: |
          PRERELEASE=""
          if [[ "${{ inputs.branch }}" == "dev" || "${{ inputs.branch }}" == "beta" ]]; then
            PRERELEASE="--prerelease"
          fi
          gh release create "v${{ steps.ver.outputs.full }}" \
            --title "v${{ steps.ver.outputs.full }}" \
            --target "${{ inputs.branch }}" \
            $PRERELEASE
        env:
          GH_TOKEN: ${{ github.token }}
